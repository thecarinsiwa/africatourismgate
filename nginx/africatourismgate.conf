# Africa Tourism Gate — reverse proxy (HTTP + HTTPS)
# Install: sudo ./scripts/setup-nginx.sh
# TLS:     sudo certbot --nginx -d app-africatourismgate.org … (si certificats absents)

upstream api_backend {
    server 127.0.0.1:3000;
}

upstream web_frontend {
    server 127.0.0.1:3002;
}

upstream admin_frontend {
    server 127.0.0.1:3001;
}

upstream pos_frontend {
    server 127.0.0.1:3003;
}

# --- API ---
server {
    listen 80;
    listen [::]:80;
    server_name api.africatourismgate.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.africatourismgate.org;

    ssl_certificate /etc/letsencrypt/live/api.africatourismgate.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.africatourismgate.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Web public ---
server {
    listen 80;
    listen [::]:80;
    server_name africatourismgate.org www.africatourismgate.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name africatourismgate.org www.africatourismgate.org;

    ssl_certificate /etc/letsencrypt/live/africatourismgate.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/africatourismgate.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

