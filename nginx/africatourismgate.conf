# Africa Tourism Gate — reverse proxy (HTTP + HTTPS)
# Install: sudo ./scripts/setup-nginx.sh
# TLS:     sudo ./scripts/issue-ssl-certs.sh
#
# Domaines distincts (ne pas mélanger) :
#   africatourismgate.org      → apps/web   (site public, port 3002)
#   app-africatourismgate.org  → apps/admin (back-office, port 3001, /login)
#   api.africatourismgate.org  → apps/api   (port 3000)
#   pos.africatourismgate.org  → apps/pos   (port 3003, optionnel)

upstream api_backend {
    server 127.0.0.1:3000;
}

upstream web_frontend {
    server 127.0.0.1:3002;
}

upstream admin_frontend {
    server 127.0.0.1:3001;
}

upstream pos_frontend {
    server 127.0.0.1:3003;
}

# API HTTPS (snippet si certificat + DNS api.africatourismgate.org)
include /etc/nginx/snippets/atg-api-servers.conf;

# --- Site public (africatourismgate.org → apps/web) ---
server {
    listen 80;
    listen [::]:80;
    server_name africatourismgate.org www.africatourismgate.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name africatourismgate.org www.africatourismgate.org;

    ssl_certificate /etc/letsencrypt/live/africatourismgate.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/africatourismgate.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # L’admin vit sur app-africatourismgate.org, pas sur le domaine public
    location = /login {
        return 301 https://app-africatourismgate.org/login;
    }

    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Back-office admin (app-africatourismgate.org → apps/admin) ---
server {
    listen 80;
    listen [::]:80;
    server_name app-africatourismgate.org www.app-africatourismgate.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app-africatourismgate.org www.app-africatourismgate.org;

    ssl_certificate /etc/letsencrypt/live/app-africatourismgate.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app-africatourismgate.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# POS (optionnel) — snippet installé par setup-nginx.sh si certificat présent
include /etc/nginx/snippets/atg-pos-servers.conf;
