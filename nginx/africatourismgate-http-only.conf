# Variante HTTP uniquement (avant certificats Let's Encrypt).
# Utilisée automatiquement par setup-nginx.sh si les certs SSL sont absents.
#
#   africatourismgate.org      → apps/web   (site public)
#   app-africatourismgate.org  → apps/admin (connexion /login)

upstream api_backend {
    server 127.0.0.1:3000;
}

upstream web_frontend {
    server 127.0.0.1:3002;
}

upstream admin_frontend {
    server 127.0.0.1:3001;
}

upstream pos_frontend {
    server 127.0.0.1:3003;
}

include /etc/nginx/snippets/atg-api-servers-http.conf;

server {
    listen 80;
    listen [::]:80;
    server_name africatourismgate.org www.africatourismgate.org;

    location = /login {
        return 301 http://app-africatourismgate.org/login;
    }

    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Back-office admin — https://app-africatourismgate.org/login
server {
    listen 80;
    listen [::]:80;
    server_name app-africatourismgate.org www.app-africatourismgate.org;

    location / {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

include /etc/nginx/snippets/atg-pos-servers-http.conf;
