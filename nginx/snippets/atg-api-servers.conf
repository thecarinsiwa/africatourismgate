# API HTTPS (optionnel tant que api.africatourismgate.org n’a pas de certificat + DNS)

server {
    listen 80;
    listen [::]:80;
    server_name api.africatourismgate.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.africatourismgate.org;

    ssl_certificate /etc/letsencrypt/live/api.africatourismgate.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.africatourismgate.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
