# POS (optionnel) — inclus seulement si certificat pos.africatourismgate.org présent
# Voir scripts/setup-nginx.sh

server {
    listen 80;
    listen [::]:80;
    server_name pos.africatourismgate.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pos.africatourismgate.org;

    ssl_certificate /etc/letsencrypt/live/pos.africatourismgate.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos.africatourismgate.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://pos_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
